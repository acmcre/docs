<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Under Maintenance | ACM COMPUTE Regional Event</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #C45C3E;
      --text: #2D2D2D;
      --text-muted: #6B6B6B;
      --bg: #FBF9F8;
      --border: #E5E5E5;
    }

    * {
      box-sizing: border-box;
      font-family: "Outfit", system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(196, 92, 62, 0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(196, 92, 62, 0.05), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Subtle background grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(-45deg, transparent, transparent 44px, rgba(196, 92, 62, 0.018) 44px, rgba(196, 92, 62, 0.018) 45px);
      z-index: -1;
    }

    .maintenance-container {
      background: #ffffff;
      border: 1px solid var(--border);
      padding: 3.5rem 2.5rem;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 28px 80px rgba(45, 45, 45, 0.08);
      position: relative;
    }

    .maintenance-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent);
    }

    .kicker {
      display: inline-block;
      padding: 0.42rem 0.75rem;
      margin-bottom: 1.5rem;
      background: rgba(196, 92, 62, 0.1);
      color: var(--accent);
      border: 1px solid rgba(196, 92, 62, 0.18);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: 2.5rem;
      margin: 0 0 1rem;
      color: var(--text);
      line-height: 1.2;
    }

    p {
      color: var(--text-muted);
      line-height: 1.7;
      font-size: 1.05rem;
      margin: 0 0 2rem;
    }

    .loader {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 3px solid rgba(196, 92, 62, 0.2);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-text {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    
    .footer-text span {
      display: block;
      margin-top: 0.25rem;
      opacity: 0.7;
    }

    @media (max-width: 576px) {
      .maintenance-container {
        padding: 2.5rem 1.5rem;
      }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="maintenance-container">
    <div class="loader"></div>
    <br>
    <div class="kicker">ACM COMPUTE 2026</div>
    <h1>We are currently performing maintenance.</h1>
    <p>The registration and certificate portal is temporarily unavailable while we update the system. Please check back shortly.</p>
  </div>

  <div class="footer-text">
    ACM COMPUTE Regional Event
    <span>Indore, Madhya Pradesh, India</span>
  </div>

</body>
</html>x
